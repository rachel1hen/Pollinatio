name: Generate Character Sheets

on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install diffusers transformers accelerate safetensors pillow

      - name: Create Generator Script
        run: |
          cat << 'EOF' > generate.py
          import json
          import os
          from diffusers import StableDiffusionPipeline
          import torch

          OUTPUT_DIR = "assets/characters"
          os.makedirs(OUTPUT_DIR, exist_ok=True)

          pipe = StableDiffusionPipeline.from_pretrained(
              "runwayml/stable-diffusion-v1-5",
              torch_dtype=torch.float32
          )
          pipe = pipe.to("cpu")

          def generate_image(prompt, seed, path):
              generator = torch.manual_seed(seed)
              image = pipe(prompt, num_inference_steps=20, generator=generator).images[0]
              image.save(path)

          def main():
              with open("character_prompts.json") as f:
                  characters = json.load(f)

              for name, data in characters.items():
                  print(f"Generating {name}")

                  char_dir = os.path.join(OUTPUT_DIR, name, "sheet")
                  os.makedirs(char_dir, exist_ok=True)

                  base = data["base_prompt"]
                  outfit = data.get("default_outfit", "casual clothes")
                  seed = data["seed"]

                  prompts = {
                      "front": f"{base}, wearing {outfit}, front view",
                      "side": f"{base}, wearing {outfit}, side profile",
                      "neutral": f"{base}, portrait, neutral expression",
                      "smile": f"{base}, portrait, slight smile"
                  }

                  for i, (tag, prompt) in enumerate(prompts.items()):
                      path = os.path.join(char_dir, f"{tag}.png")
                      generate_image(prompt, seed + i, path)
                      print(f"Saved {path}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Run Generator
        run: python generate.py

      - name: Commit Images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/
          git commit -m "Auto-generate character sheets" || echo "No changes"
          git push
